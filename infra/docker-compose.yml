services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: exactly-once-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  publisher:
    build:
      context: ..
      dockerfile: src/Publisher/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE: message
    depends_on:
      rabbitmq:
        condition: service_healthy

  consumer:
    build:
      context: ..
      dockerfile: src/Consumer/Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE: message
    depends_on:
      rabbitmq:
        condition: service_healthy

  k6:
    image: grafana/k6:latest
    profiles:
      - load-test
    environment:
      API_URL: http://publisher:8080/messages
    volumes:
      - ./k6:/scripts:ro
    command: run /scripts/messages.js
    depends_on:
      - publisher
